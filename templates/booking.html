{% extends "base.html" %}

{% block title %}Booking for {{ competition['name'] }} || GUDLFT{% endblock %}

{% block content %}
    <h2>{{ competition['name'] }}</h2>
    <p>Places available: {{ competition['numberOfPlaces'] }}</p>

    <form action="{{ url_for('purchasePlaces') }}" method="post">
        <input type="hidden" name="club" value="{{ club['name'] }}">
        <input type="hidden" name="competition" value="{{ competition['name'] }}">

        <label for="places">How many places?</label>
        <input
                type="number"
                name="places"
                id="places"
                min="1"
                max="{{
                    12 if 12 < club['points'] | int and 12 < competition['numberOfPlaces'] | int
                    else (club['points'] | int if club['points'] | int < competition['numberOfPlaces'] | int else competition['numberOfPlaces'])
                }}"
                required
        />
        <button type="submit">Book</button>
    </form>
{% endblock %}
